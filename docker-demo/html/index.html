<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Homelab Chiderson</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #ecf1f5; color: #1a1612; margin: 0; padding: 60px 20px; text-align: center; }
.card { max-width: 540px; margin: 0 auto; background: #fff; padding: 40px 32px; border-radius: 14px; border: 1px solid #d8dde3; }
h1 { font-family: 'Times New Roman', serif; margin: 0 0 8px; font-size: 2rem; }
.lede { color: #6b6258; margin-bottom: 24px; }
.tag { display: inline-block; background: #e3eaf2; color: #2d4f8e; padding: 5px 12px; border-radius: 4px; font-size: 0.78rem; margin: 4px 2px; }
.foot { margin-top: 22px; padding-top: 18px; border-top: 1px solid #eee; font-size: 0.85rem; color: #888; }
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #5a9970; box-shadow: 0 0 0 4px rgba(90,153,112,0.18); margin-right: 6px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Homelab Chiderson</h1>
    <p class="lede">Page de test, servie par un conteneur nginx</p>
    <div>
      <span class="tag">Docker</span>
      <span class="tag">Nginx Alpine</span>
      <span class="tag">docker-compose</span>
    </div>
    <p class="foot"><span class="dot"></span>Conteneur en ligne · port 8080</p>
  </div>
</body>
</html>
